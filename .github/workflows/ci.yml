name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pulled from the repo's encrypted Actions secrets (set via scripts/set-github-secrets.mjs,
      # never committed). GITHUB_TOKEN is a name reserved by Actions itself, so the app's own
      # token is stored as APP_GITHUB_TOKEN and remapped here to the env var the app expects.
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.APP_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
